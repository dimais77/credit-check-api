name: credit-check-api

x-db-url: &db-url
  APP_CONFIG__DB__URL: postgresql+asyncpg://${POSTGRES_USER:-credit}:${POSTGRES_PASSWORD:-credit}@db:5432/${POSTGRES_DB:-credit}

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credit}
      POSTGRES_DB: ${POSTGRES_DB:-credit}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: credit-check-api:0.1.0
    command: ["alembic", "upgrade", "head"]
    environment:
      <<: *db-url
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-check-api:0.1.0
    environment:
      <<: *db-url
      APP_CONFIG__STORAGE__DIR: /app/storage
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - appstorage:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  appstorage: